        <h2 class="titulo_secundario">Entre em Contato:</h2>
        <form action="" method=""  autocomplete="off">
           <label for="nomepessoa">Nome:</label>
            <input type="text" name="nomepessoa" 
            id="nomepessoa" minlength="3" maxlength="15"
            required><br><br>

            <label for="email">Email:</label>
            <input type="email" name="email" id="email"
            required><br><br>

            <label for="ano">Ano de Nascimento</label>
            <input type="number" id="ano" name="ano" max="2026" min="1900" placeholder="Informe ano de Nascimento"><br><br>

            <label for="telefone">Telefone</label>
            <input type="tel" name="telefone" id="telefone" placeholder="Informe seu Telefone"><br><br>

            <label for="github">Infome seu Github:</label>
            <input type="url" name="github" id="github" placeholder="Informe seu github"><br><br>

            <label for="senha">Infome sua Senha</label>
            <input type="password" name="senha" id="senha"><br><br>
            
            <label for="arquivo">Anexe um Arquivo:</label>
            <input type="file" id="arquivo" name="arquivo"><br><br>

            <label for="cor">Escolha uma Cor:</label>
            <input type="color" id="cor" name="cor"><br><br>

     <fieldset>

            <legend> Campos de Tempo</legend>
            <label for="data">Informe a data</label>
            <input type="date" name="data" id="data"><br><br>

            <label for="mes" >Informe o Mes</label>
            <input type="month" name="mes" id="mes"><br><br>

            <label for="semana" >Informe a Semana</label>
            <input type="week" name="semana" id="semana"><br><br>
            
            <label for="hora" >Informe a hora:</label>
            <input type="time" name="hora" id="hora"><br><br>

             <label for="datahora" >Data e Hora Atual</label>
            <input type="datetime-local" name="datahora" id="datahora"><br><br>

    </fieldset>

            <label for="pesquisa">Pesquisa</label>
            <input type="search" id="pesquisa" name="pesquisa"><br><br>

            <label for="descricao">Informe aqui o que voce gosta nos filme</label><br>
            <textarea cols="30" rows="10" name="descricao" id="descricao"></textarea><br><br>
            
    <fieldset>

            <legend>Qual seu Filme favorito?</legend>
            <input type="radio" name="filme" id="Filme1" value="Filme 1"><label 
            for="Filme1">Filme 1</label>

            <input checked type="radio" name="filme" id="Filme2" value="Filme 2"><label 
            for="Filme2">Filme 2</label>

            <input type="radio" name="filme" id="Filme3" value="Filme 3"><label 
            for="Filme3">Filme 3</label>

   </fieldset><br><br>
            
            <select>
                <option value="Filme 1">Filme 1</option>
                <option value="FIlme 2">Filme 2</option>
                <option value="Filme 3">Filme 3</option>
            </select><br><br><br><br>


            <button type="reset">Limpar</button>
            <button type="submit">Enviar</button>



        </form>

</body>
</html>
